host: supabase.local

## Gateway API HTTPRoute toggle (alternative to Ingress — alpha).
## Exactly one of ingress.enabled / gateway.enabled should be true.
gateway:
  enabled: false
  ## parentRefs attach the HTTPRoute to one or more Gateway listeners.
  ## If empty, defaults to { name: traefik, namespace: traefik, sectionName: web }.
  parentRefs: []
  ## Optional annotations on the HTTPRoute resource.
  annotations: {}

ingress:
  enabled: true

  ## Ingress class name. Common values: "nginx", "azure-application-gateway",
  ## "traefik". Leave "" to use the cluster's default IngressClass.
  className: ""

  annotations: {}
    ## AGIC: Kong returns 401/404 on unauthenticated health probes; accept these
    ## as healthy. Harmless on other controllers.
    # appgw.ingress.kubernetes.io/health-probe-status-codes: "200-499"
    ## nginx: rewrite to /
    # nginx.ingress.kubernetes.io/rewrite-target: /
    # cert-manager.io/cluster-issuer: "letsencrypt-staging"
    # kubernetes.io/tls-acme: "true"

  ## TLS configuration. Use cert-manager for automatic certificate provisioning.
  tls: []
    # - secretName: example-com-tls
    #   hosts:
    #     - example.com

serviceAccount:
  ## Shared ServiceAccount used by all Supabase services by default. Each
  ## service falls back to this SA unless its per-service block below sets
  ## `create: true` (for a dedicated SA, e.g. IRSA / Azure Workload Identity
  ## where the service needs its own cloud identity) or `name: <existing-sa>`.
  create: true
  name: ""
  annotations: {}

  ## Per-service overrides. Empty map = use the shared SA above. Set
  ##   <svc>:
  ##     create: true
  ##     annotations: { ... }
  ## to render a dedicated SA for that service.
  analytics: {}
  auth: {}
  functions: {}
  imgproxy: {}
  kong: {}
  meta: {}
  minio: {}
  realtime: {}
  rest: {}
  storage: {}
  studio: {}

  ## Vector keeps its own SA by default: it is bound to a ClusterRole with
  ## pods/log list+watch. Routing that binding through the shared SA would
  ## grant every Supabase service pod/log access cluster-wide.
  vector:
    create: true
    annotations: {}
    name: ""

