## Supabase Helm Chart Configuration
##
## Supabase is composed of multiple services running together
## to provide a full backend platform. This chart deploys and
## configures the following components:
##
## - Kong (API Gateway)
## - Studio (Admin UI)
## - Postgres (Database)
## - PostgREST (REST API)
## - Realtime (WebSocket server)
## - Storage API
## - Postgres Meta
## - GoTrue (Authentication)
## - Edge Functions (Deno runtime)
## - Logflare (Analytics)
## - Vector (Logs pipeline)
## - Imgproxy (Image transformation)
## - MinIO (S3-compatible storage)
##
## This chart mirrors the official Supabase
## Docker setup, adapted for Kubernetes.
##
## Reference:
## https://github.com/supabase/supabase/tree/master/docker
##
## Configuration is grouped by domain rather than by component.
## Each section contains per-component blocks where applicable.
##
##  1. secret         - All credentials and sensitive values
##  2. deployment     - Pod configuration per component
##  3. image          - Container image settings per component
##  4. environment    - Environment variables per component
##  5. persistence    - PVC configuration per component
##  6. service        - Kubernetes Service configuration per component
##  7. autoscaling    - HPA configuration per component
##  8. ingress        - External access configuration
##  9. serviceAccount - ServiceAccount configuration per component
## 10. bigQuery       - Optional BigQuery backend configuration
## 11. cnpg           - CloudNativePG-managed PostgreSQL cluster
## 12. gateway        - Optional Gateway API HTTPRoute (alpha)

secret:
  ## JSON Web Tokens + asymmetric API keys
  ## Used to sign and validate access tokens across all Supabase services.
  ## A pre-install Job (jwt-generator) generates the following keys on first
  ## install and writes them into a single Secret `<release>-supabase-jwt`:
  ##   secret, anonKey, serviceKey                (HS256 legacy)
  ##   anonKeyAsymmetric, serviceKeyAsymmetric    (ES256)
  ##   publishableKey, secretKey                  (opaque sb_* keys)
  ##   jwtKeys, jwtJwks                           (EC JWKS)
  ## Existing Secrets are left untouched, so keys never rotate implicitly.
  ## Docs: https://supabase.com/docs/guides/self-hosting/self-hosted-auth-keys
  ##
  jwt:
    ## Reference to an existing Secret with pre-populated keys (see list above).
    ## When set (non-empty), the generator Job is skipped and services read
    ## all keys from this Secret.
    existingSecret: null
    ## Map to actual key names inside existingSecret if they differ from the
    ## defaults (anonKey, serviceKey, secret, publishableKey, secretKey,
    ## anonKeyAsymmetric, serviceRoleKeyAsymmetric, jwtKeys, jwtJwks).
    existingSecretKey:
      anonKey: anonKey
      serviceKey: serviceKey
      secret: secret

  publishableKey:
    existingSecret: null

    ## PostgreSQL credentials
    ##
    ## A pre-install Job generates one alphanumeric password per Postgres role
    ## (postgres, supabase_admin, authenticator, pgbouncer, supabase_auth_admin,
    ## supabase_storage_admin, supabase_functions_admin) and writes each into a
    ## separate `kubernetes.io/basic-auth` Secret named
    ## `<release>-db-<role-with-dashes>`. CNPG consumes those directly and the
    ## Supabase services each read the password of the role they connect as.
    ## Passwords never rotate once generated — missing Secrets are filled in,
    ## existing ones are left untouched.
    ##
  db:
    ## Database name used by CNPG initdb.
    database: "postgres"

    ## Bring-your-own per-role Secrets. Each value, if non-empty, must name an
    ## existing Secret of type `kubernetes.io/basic-auth` with keys
    ## `username` (= role name) and `password`. Listed roles whose entry is
    ## empty are auto-generated by the db-generator Job.
    existingSecrets: {}
    #   postgres: ""
    #   supabase_admin: ""
    #   authenticator: ""
    #   pgbouncer: ""
    #   supabase_auth_admin: ""
    #   supabase_storage_admin: ""
    #   supabase_functions_admin: ""

    ## All Secrets below are auto-generated on first install by the
    ## `credentials-generator` pre-install Job. Passwords/tokens are random
    ## (openssl rand); non-password fields (username, OpenAI key, MinIO user)
    ## accept optional inline overrides. Existing Secrets are never overwritten
    ## — delete the Secret to trigger regeneration.
    ##
    ## For production bring-your-own, set `<secret>.existingSecret` to the name of
    ## a pre-populated Secret; the generator then skips that entry entirely.

    ## Logflare credentials (publicAccessToken, privateAccessToken) — both random.
  analytics:
    existingSecret: null
    existingSecretKey:
      publicAccessToken: publicAccessToken
      privateAccessToken: privateAccessToken

    ## BigQuery service account credentials (gcloud.json). Bring-your-own only
    ## — can't be generated. Leave gcloudJson empty unless BigQuery is enabled.
  bigquery:
    gcloudJson: ""
    existingSecret: null
    existingSecretKey:
      gcloudJson: gcloud.json

    ## SMTP credentials (username, password). Bring-your-own only — real mail
    ## server login, can't be generated. Leave empty for no outbound mail.
  smtp:
    username: ""
    password: ""
    existingSecret: null
    existingSecretKey:
      username: username
      password: password

    ## Studio dashboard credentials. `username` defaults to "supabase", `password`
    ## is random, `openAiApiKey` is optional (for Studio AI features).
  dashboard:
    # username: "supabase"
    # openAiApiKey: ""
    existingSecret: null
    existingSecretKey:
      username: username
      password: password
      openAiApiKey: openAiApiKey

    ## S3-compatible credentials (keyId, accessKey) — both random.
  s3:
    existingSecret: null
    existingSecretKey:
      keyId: keyId
      accessKey: accessKey
      password: password

    ## Realtime service SECRET_KEY_BASE (Phoenix) — random.
    ## Docs: https://supabase.com/docs/guides/realtime
  realtime:
    existingSecret: null
    existingSecretKey:
      secretKeyBase: secretKeyBase

    ## postgres-meta cryptoKey — random.
    ## Docs: https://github.com/supabase/postgres-meta
  meta:
    existingSecret: null
    existingSecretKey:
      cryptoKey: cryptoKey

    ## MinIO root credentials. `user` defaults to "supa-storage", `password` is random.
  minio:
    # user: "supa-storage"
    existingSecret: null
    existingSecretKey:
      user: user
      password: password

  generator:
    serviceAccount:
      create: true
      name: null

deployment:
  ## `extraEnv` (per service, below) is a raw list of container env entries
  ## appended to the container's `env:`. Use it only for variables that need
  ## `valueFrom` — secret/configmap keys, field refs, resource refs. Plain
  ## literal values belong in `environment.<svc>` (rendered as `value:`).
  ## Entries are appended verbatim; avoid re-declaring names already set by
  ## the template.
  ##
  ## Example — OAuth provider secrets for auth (literals in `environment.auth`,
  ## secrets here):
  ##   environment:
  ##     auth:
  ##       GOTRUE_EXTERNAL_GOOGLE_ENABLED: "true"
  ##       GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: "https://supabase.local/auth/v1/callback"
  ##   deployment:
  ##     auth:
  ##       extraEnv:
  ##         - name: GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID
  ##           valueFrom:
  ##             secretKeyRef:
  ##               name: my-oauth
  ##               key: google-client-id
  ##         - name: GOTRUE_EXTERNAL_GOOGLE_SECRET
  ##           valueFrom:
  ##             secretKeyRef:
  ##               name: my-oauth
  ##               key: google-secret

  analytics:
    enabled: true
    replicaCount: 1
    nameOverride: ""
    fullnameOverride: ""
    livenessProbe: {}
    readinessProbe: {}
    podAnnotations: {}
    podSecurityContext:
    securityContext: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
    topologySpreadConstraints: []
    volumeMounts: {}
    volumes: {}
    resources: {}
    extraEnv: []
    podDisruptionBudget:
