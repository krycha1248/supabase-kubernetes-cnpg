## =============================================================================
## CLOUDNATIVEPG — HA PostgreSQL via CloudNativePG operator
## =============================================================================
## Deploys a CloudNativePG Cluster CRD as the PostgreSQL backend for Supabase.
## Requires the CloudNativePG operator >= 1.28.2 to be installed in the cluster.
##
## The DB service name is transparently wired via the supabase.db.fullname
## helper (<clusterName>-rw) so all service templates connect to the CNPG
## primary without additional configuration.
## =============================================================================

cnpg:
  ## Enable CloudNativePG-managed PostgreSQL cluster.
  enabled: true

  ## Cluster name — CNPG creates services: <name>-rw, <name>-ro, <name>-r
  clusterName: "supabase-db"

  ## Number of PostgreSQL instances (1 primary + N-1 standbys).
  instances: 1

  image:
    repository: supabase/postgres
    ## "" = use Chart.yaml `appVersion` as the tag. Set explicitly to override.
    tag: ""

  ## Postgres process UID/GID. The supabase/postgres image uses 101/102,
  ## not the CNPG upstream default (26).
  postgresUID: 101
  postgresGID: 102

  ## StorageClass for CNPG's Postgres PVCs is shared with the rest of the
  ## chart via `persistence.storageClassName` — no separate knob here.
  storage:
    size: 10Gi

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

  ## Annotations/labels for the ServiceAccount CNPG creates for the Postgres
  ## pods (CNPG owns the SA lifecycle — only metadata can be customized).
  ## Typical use: IRSA / Azure Workload Identity so the barman-cloud plugin
  ## can reach S3/blob without static credentials.
  serviceAccountTemplate:
    annotations: {}
    labels: {}

  ## PostgreSQL configuration overrides. Mirrors the working Supabase/CNPG
  ## reference config: Supabase-specific extensions (pg_net, pg_cron, pgaudit,
  ## supautils, …) are declared in shared_preload_libraries so they can be
  ## enabled via CREATE EXTENSION without restarting the cluster.
  postgresql:
    parameters:
      shared_buffers: "256MB"
      max_connections: "200"
      effective_cache_size: "1GB"
      work_mem: "4MB"
      maintenance_work_mem: "64MB"
      wal_level: "logical"
      max_wal_senders: "10"
      max_replication_slots: "10"
      track_activities: "on"
      track_counts: "on"
      track_io_timing: "on"
      track_functions: "all"
      cron.database_name: "postgres"
    ## supabase/postgres docker default set + pg_stat_monitor + supautils.
    shared_preload_libraries:
      - "pg_stat_statements"
      # - "pg_stat_monitor"
      - "pgaudit"
      - "plpgsql"
      - "plpgsql_check"
      - "pg_cron"
      - "pg_net"
      - "auto_explain"
      - "pg_tle"
      - "plan_filter"
      # - "supabase_vault"
      - "supautils"

  ## ---------------------------------------------------------------------------
  ## Backups via the CloudNativePG Barman Cloud plugin (plugin-barman-cloud).
  ##
  ## The plugin itself must be installed in the cluster separately; this chart
  ## only renders the plugin-facing resources (ObjectStore, Cluster.spec.plugins
  ## wiring, and ScheduledBackup). Install guide:
  ## https://github.com/cloudnative-pg/plugin-barman-cloud
  ## ---------------------------------------------------------------------------
  backup:
    ## Master toggle. When false, no ObjectStore / ScheduledBackup is rendered
    ## and no plugin entry is added to the Cluster spec.
    enabled: false

    ## Plugin name as registered by plugin-barman-cloud in the cluster.
    pluginName: "barman-cloud.cloudnative-pg.io"

    objectStore:
      ## Reference an already-existing ObjectStore (e.g., shared across
      ## clusters) by name. When set, the chart will NOT render an ObjectStore
      ## and will only wire the Cluster plugin to this name.
      existingName: ""

      ## Name of the ObjectStore the chart renders when existingName is empty.
      ## Defaults to "<cnpg.clusterName>-backup".
      name: ""

      ## Passed to ObjectStore.spec.retentionPolicy.
      retentionPolicy: "30d"

      ## Pass-through to ObjectStore.spec.configuration. Required when
      ## existingName is empty — the chart does not invent a destination.
      ##
      ## Example — in-cluster bundled MinIO (see `minio:` section):
      ## configuration:
      ##   destinationPath: s3://supabase-backup/
      ##   endpointURL: http://supabase-minio:9000
      ##   s3Credentials:
      ##     accessKeyId:
      ##       name: supabase-minio
      ##       key: rootUser
      ##     secretAccessKey:
      ##       name: supabase-minio
      ##       key: rootPassword
      ##   wal:
      ##     compression: gzip
      ##   data:
      ##     compression: gzip
      ##
      ## Example — AWS S3 with IRSA (no explicit credentials needed):
      ## configuration:
      ##   destinationPath: s3://my-bucket/supabase
      ##
      ## Example — GCS:
      ## configuration:
      ##   destinationPath: gs://my-bucket/supabase
      ##   googleCredentials:
      ##     applicationCredentials:
      ##       name: gcs-creds
      ##       key: key.json
      ##
      ## Example — Azure Blob:
      ## configuration:
      ##   destinationPath: https://<account>.blob.core.windows.net/<container>/
      ##   azureCredentials:
      ##     storageAccount:
      ##       name: azure-creds
      ##       key: storage-account
      ##     storageKey:
      ##       name: azure-creds
      ##       key: storage-key
      configuration: {}

    scheduledBackup:
      ## Render a ScheduledBackup resource. Set to false to only enable
      ## continuous WAL archiving via the plugin without a scheduled base backup.
      enabled: true

      ## Name of the ScheduledBackup. Defaults to
      ## "<cnpg.clusterName>-daily" when empty.
      name: ""

      ## 6-field Quartz cron (seconds minutes hours day month dow) used by CNPG.
      ## Default: every day at 02:00:00.
      schedule: "0 0 2 * * *"

      ## Take a backup immediately when the ScheduledBackup is created.
      immediate: false

      ## Temporarily stop scheduling without deleting the resource.
      suspend: false

      ## backupOwnerReference: "none" | "self" | "cluster".
      backupOwnerReference: "self"
