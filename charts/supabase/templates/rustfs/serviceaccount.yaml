{{- if .Values.deployment.rustfs.enabled -}}
{{- if .Values.serviceAccount.rustfs.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "supabase.rustfs.serviceAccountName" . }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.rustfs.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
