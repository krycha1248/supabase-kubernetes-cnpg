{{- if .Values.deployment.rustfs.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "supabase.rustfs.fullname" . }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.rustfs.type }}
  ports:
    - port: {{ .Values.service.rustfs.port }}
      targetPort: 9000
      protocol: TCP
      name: http
  selector:
    {{- include "supabase.rustfs.selectorLabels" . | nindent 4 }}
{{- end }}
