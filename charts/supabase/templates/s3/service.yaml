{{- if .Values.deployment.s3.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "supabase.s3.fullname" . }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.s3.type }}
  ports:
    - port: {{ .Values.service.s3.port }}
      targetPort: 8333
      protocol: TCP
      name: s3
  selector:
    {{- include "supabase.s3.selectorLabels" . | nindent 4 }}
{{- end }}
