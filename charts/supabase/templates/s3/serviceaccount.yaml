{{- if .Values.deployment.s3.enabled -}}
{{- if .Values.serviceAccount.s3.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "supabase.s3.serviceAccountName" . }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.s3.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
