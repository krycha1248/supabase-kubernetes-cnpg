{{- if .Values.cnpg.enabled }}
{{- /*
  Compute the ObjectStore name used for restore (externalClusters reference).
  Priority order:
    1. cnpg.restore.objectStoreName (explicit override)
    2. cnpg.backup.objectStore.existingName (shared / pre-existing ObjectStore)
    3. "<clusterName>-backup" (chart-generated ObjectStore)
  Fail fast when restore is enabled but no name can be resolved and backup is
  disabled (all three sources empty/false).

  $backupServerName: when restore is active, route new WALs to a dedicated
  "<clusterName>-restored" path so barman-cloud-check-wal-archive finds an
  empty archive and does not block the recovery. When restore is not active,
  leave serverName unset — barman defaults to clusterName.
*/}}
{{- $restoreObjectStoreName := "" }}
{{- $restoreServerName := .Values.cnpg.restore.serverName | default .Values.cnpg.clusterName }}
{{- $backupServerName := "" }}
{{- if .Values.cnpg.restore.enabled }}
  {{- $backupServerName = printf "%s-restored" .Values.cnpg.clusterName }}
{{- end }}
{{- if .Values.cnpg.restore.enabled }}
  {{- if .Values.cnpg.restore.objectStoreName }}
    {{- $restoreObjectStoreName = .Values.cnpg.restore.objectStoreName }}
  {{- else if .Values.cnpg.backup.objectStore.existingName }}
    {{- $restoreObjectStoreName = .Values.cnpg.backup.objectStore.existingName }}
  {{- else if .Values.cnpg.backup.enabled }}
    {{- $restoreObjectStoreName = .Values.cnpg.backup.objectStore.name | default (printf "%s-backup" .Values.cnpg.clusterName) }}
  {{- else }}
    {{- fail "cnpg.restore.enabled=true but no ObjectStore name can be resolved: set cnpg.restore.objectStoreName, cnpg.backup.objectStore.existingName, or enable cnpg.backup" }}
  {{- end }}
{{- end }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Values.cnpg.clusterName }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
spec:
  instances: {{ .Values.cnpg.instances }}

  imageName: "{{ .Values.cnpg.image.repository }}:{{ .Values.cnpg.image.tag | default .Chart.AppVersion }}"

  postgresql:
    parameters:
      {{- range $key, $value := .Values.cnpg.postgresql.parameters }}
      {{ $key }}: {{ $value | quote }}
      {{- end }}
    {{- with .Values.cnpg.postgresql.shared_preload_libraries }}
    shared_preload_libraries:
      {{- toYaml . | nindent 6 }}
    {{- end }}

  {{- with .Values.cnpg.resources }}
  resources:
    {{- toYaml . | nindent 4 }}
  {{- end }}

  storage:
    size: {{ .Values.cnpg.storage.size }}
    {{- with .Values.persistence.storageClassName }}
    storageClass: {{ . | quote }}
    {{- end }}

  postgresUID: {{ .Values.cnpg.postgresUID }}
  postgresGID: {{ .Values.cnpg.postgresGID }}

  {{- with .Values.cnpg.serviceAccountTemplate }}
  {{- if or .annotations .labels }}
  serviceAccountTemplate:
    metadata:
      {{- with .annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .labels }}
      labels:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- end }}
  {{- end }}

  enableSuperuserAccess: true

  # Each role's password lives in its own basic-auth Secret created by the
  # pre-install db-generator Job (or supplied via secret.db.existingSecrets).
  superuserSecret:
    name: {{ include "supabase.secret.dbRole" (dict "root" $ "role" "postgres") }}

  bootstrap:
    {{- if .Values.cnpg.restore.enabled }}
    recovery:
      source: {{ $restoreObjectStoreName }}
      {{- if .Values.cnpg.restore.backupName }}
      backup:
        name: {{ .Values.cnpg.restore.backupName }}
      {{- end }}
      {{- if or .Values.cnpg.restore.targetTime .Values.cnpg.restore.targetLSN .Values.cnpg.restore.targetXID }}
      recoveryTarget:
        {{- if .Values.cnpg.restore.targetTime }}
        targetTime: {{ .Values.cnpg.restore.targetTime | quote }}
        {{- end }}
        {{- if .Values.cnpg.restore.targetLSN }}
        targetLSN: {{ .Values.cnpg.restore.targetLSN | quote }}
        {{- end }}
        {{- if .Values.cnpg.restore.targetXID }}
        targetXID: {{ .Values.cnpg.restore.targetXID | quote }}
        {{- end }}
      {{- end }}
    {{- else }}
    initdb:
      database: {{ .Values.secret.db.database | default "postgres" }}
      owner: supabase_admin
      # Set the supabase_admin password from its own basic-auth Secret so the
      # initdb-owned role matches what services connect with.
      secret:
        name: {{ include "supabase.secret.dbRole" (dict "root" $ "role" "supabase_admin") }}
      encoding: 'UTF8'
      # Runs as the `postgres` superuser against the `postgres` DB.
      # Needed because `database: postgres` does NOT transfer ownership of
      # the postgres system DB to supabase_admin, so GRANT/CREATE on
      # DATABASE postgres issued as supabase_admin would fail silently.
      postInitSQLRefs:
        configMapRefs:
          {{- $cm := include "supabase.db.initdb.fullname" . }}
          {{- range $key := list "00-init.sql" "01-migrations.sql" "98-webhooks.sql" "99-realtime.sql" }}
          - name: {{ $cm }}
            key: {{ $key }}
          {{- end }}
          {{- if and .Values.secret.jwt (not .Values.secret.jwt.existingSecret) }}
          # 99-jwt.sql is materialized by the jwt-generator Job with literal values
          # (not env-var indirection), so it works during CNPG's bootstrap.initdb.
          - name: {{ include "supabase.secret.jwt" . }}-sql
            key: 99-jwt.sql
          {{- end }}
    {{- end }}

  env:
    - name: POSTGRES_USER
      value: supabase_admin

  {{- if .Values.cnpg.backup.enabled }}
  plugins:
    - name: {{ .Values.cnpg.backup.pluginName | quote }}
      isWALArchiver: true
      parameters:
        barmanObjectName: {{ .Values.cnpg.backup.objectStore.existingName | default (.Values.cnpg.backup.objectStore.name | default (printf "%s-backup" .Values.cnpg.clusterName)) | quote }}
        {{- if $backupServerName }}
        serverName: {{ $backupServerName | quote }}
        {{- end }}
  {{- end }}

  # Declaratively-managed Supabase roles. Each password comes from its own
  # basic-auth Secret (see supabase.secret.dbRole helper).
  managed:
    roles:
      - name: authenticator
        ensure: present
        comment: "PostgREST login role"
        login: true
        inherit: false
        passwordSecret:
          name: {{ include "supabase.secret.dbRole" (dict "root" $ "role" "authenticator") }}
      - name: pgbouncer
        ensure: present
        comment: "PgBouncer connection pooler role"
        login: true
        passwordSecret:
          name: {{ include "supabase.secret.dbRole" (dict "root" $ "role" "pgbouncer") }}
      - name: supabase_auth_admin
        ensure: present
        comment: "Owner of auth schema"
        login: true
        createrole: true
        inherit: false
        passwordSecret:
          name: {{ include "supabase.secret.dbRole" (dict "root" $ "role" "supabase_auth_admin") }}
      - name: supabase_storage_admin
        ensure: present
        comment: "Owner of storage schema"
        login: true
        createrole: true
        inherit: false
        # Storage runs `set_config('role','service_role',true)` on every
        # request. With both supabase_storage_admin and authenticator
        # NOINHERIT, upstream migration 20231013's transitive chain
        # (storage_admin → authenticator → service_role) is not satisfied by
        # PG17's check_role(), so re-grant the memberships directly and let
        # CNPG reconcile them if a later migration revokes them again.
        inRoles:
          - anon
          - authenticated
          - service_role
        passwordSecret:
          name: {{ include "supabase.secret.dbRole" (dict "root" $ "role" "supabase_storage_admin") }}
      - name: supabase_functions_admin
        ensure: present
        comment: "Owner of supabase_functions schema"
        login: true
        createrole: true
        inherit: false
        passwordSecret:
          name: {{ include "supabase.secret.dbRole" (dict "root" $ "role" "supabase_functions_admin") }}

  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname

  {{- if .Values.cnpg.restore.enabled }}
  externalClusters:
    - name: {{ $restoreObjectStoreName }}
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: {{ $restoreObjectStoreName }}
          serverName: {{ $restoreServerName }}
  {{- end }}
{{- end }}
