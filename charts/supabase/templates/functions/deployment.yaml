{{- if .Values.deployment.functions.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "supabase.functions.fullname" . }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.functions.enabled }}
  replicas: {{ .Values.deployment.functions.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "supabase.functions.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.deployment.functions.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "supabase.functions.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.image.functions.pullSecrets}}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "supabase.functions.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.deployment.functions.podSecurityContext | nindent 8 }}
      containers:
        - args:
            - start
            - --main-service
            - /home/deno/functions/main
          name: {{ include "supabase.functions.name" $ }}
          securityContext:
            {{- toYaml .Values.deployment.functions.securityContext | nindent 12 }}
          image: "{{ .Values.image.functions.repository }}:{{ .Values.image.functions.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.functions.pullPolicy }}
          {{- if .Values.deployment.functions.envFrom }}
          envFrom:
            {{- toYaml .Values.deployment.functions.envFrom | nindent 12 }}
          {{- end }}
          env:
            {{- range $key, $value := .Values.environment.functions }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}

            {{- if .Values.deployment.kong.enabled }}
            - name: SUPABASE_URL
              value: http://{{ include "supabase.kong.fullname" . }}:{{ .Values.service.kong.port }}
            {{- end }}
            - name: SUPABASE_PUBLIC_URL
              value: {{ .Values.environment.auth.API_EXTERNAL_URL | quote }}

            - name: DB_HOSTNAME
              value: {{ include "supabase.db.fullname" . }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.dbRole" (dict "root" $ "role" "postgres") }}
                  key: password
            - name: DB_PASSWORD_ENC
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.dbRole" (dict "root" $ "role" "postgres") }}
                  key: password
            - name: DB_DATABASE
              value: {{ .Values.secret.db.database | default "postgres" | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  {{- if .Values.secret.jwt.existingSecret }}
                  name: {{ .Values.secret.jwt.existingSecret }}
                  key: {{ .Values.secret.jwt.existingSecretKey.secret | default "secret" }}
                  {{- else }}
                  name: {{ include "supabase.secret.jwt" . }}
                  key: secret
                  {{- end }}
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  {{- if .Values.secret.jwt.existingSecret }}
                  name: {{ .Values.secret.jwt.existingSecret }}
                  key: {{ .Values.secret.jwt.existingSecretKey.anonKey | default "anonKey" }}
                  {{- else }}
                  name: {{ include "supabase.secret.jwt" . }}
                  key: anonKey
                  {{- end }}
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  {{- if .Values.secret.jwt.existingSecret }}
                  name: {{ .Values.secret.jwt.existingSecret }}
                  key: {{ .Values.secret.jwt.existingSecretKey.serviceKey | default "serviceKey" }}
                  {{- else }}
                  name: {{ include "supabase.secret.jwt" . }}
                  key: serviceKey
                  {{- end }}
            - name: SUPABASE_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.publishableKey" . }}
                  key: publishableKey
            - name: SUPABASE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.jwt" . }}
                  key: secretKey
            - name: SUPABASE_PUBLISHABLE_KEYS
              value: '{"default":"$(SUPABASE_PUBLISHABLE_KEY)"}'
            - name: SUPABASE_SECRET_KEYS
              value: '{"default":"$(SUPABASE_SECRET_KEY)"}'
            - name: SUPABASE_DB_URL
              value: $(DB_DRIVER)://$(DB_USERNAME):$(DB_PASSWORD_ENC)@$(DB_HOSTNAME):$(DB_PORT)/$(DB_DATABASE)?search_path=auth&sslmode=$(DB_SSL)
            - name: __HEALTH_TOKEN__
              value: {{ include "supabase.functions.healthToken" $ | quote }}
            {{- with .Values.deployment.functions.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /_internal/health
              port: 9000
              httpHeaders:
                - name: x-health-token
                  value: {{ include "supabase.functions.healthToken" $ | quote }}
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /_internal/health
              port: 9000
              httpHeaders:
                - name: x-health-token
                  value: {{ include "supabase.functions.healthToken" $ | quote }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
          {{- with .Values.deployment.functions.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
            - name: deno-cache
              mountPath: /root/.cache/deno
            - mountPath: /home/deno/functions/main/index.ts
              name: functions-main
              subPath: index.ts
          {{- range $cm := .Values.deployment.functions.extraConfigMaps }}
          {{- range $file := default (list "index.ts") $cm.files }}
            - name: fn-{{ $cm.name }}
              mountPath: /home/deno/functions/{{ $cm.mountPath }}/{{ $file }}
              subPath: {{ $file }}
          {{- end }}
          {{- end }}
          {{- with .Values.deployment.functions.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        {{- with .Values.deployment.functions.volumes }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
        - name: deno-cache
          emptyDir: {}
        - name: functions-main
          configMap:
            name: {{ include "supabase.functions.fullname" . }}-main
        {{- range .Values.deployment.functions.extraConfigMaps }}
        - name: fn-{{ .name }}
          configMap:
            name: {{ .name }}
        {{- end }}
      {{- with .Values.deployment.functions.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.deployment.functions.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.deployment.functions.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.deployment.functions.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
