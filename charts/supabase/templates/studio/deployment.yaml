{{- if .Values.deployment.studio.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "supabase.studio.fullname" . }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.studio.enabled }}
  replicas: {{ .Values.deployment.studio.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "supabase.studio.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.deployment.studio.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "supabase.studio.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.image.studio.pullSecrets}}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "supabase.studio.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.deployment.studio.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ include "supabase.studio.name" $ }}
          securityContext:
            {{- toYaml .Values.deployment.studio.securityContext | nindent 12 }}
          image: "{{ .Values.image.studio.repository }}:{{ .Values.image.studio.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.studio.pullPolicy }}
          env:
            {{- range $key, $value := .Values.environment.studio }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if .Values.deployment.kong.enabled }}
            - name: SUPABASE_URL
              value: http://{{ include "supabase.kong.fullname" . }}:{{ .Values.service.kong.port }}
            {{- end }}
            {{- if .Values.deployment.meta.enabled }}
            - name: STUDIO_PG_META_URL
              value: http://{{ include "supabase.meta.fullname" . }}:{{ .Values.service.meta.port }}
            {{- end }}

            - name: POSTGRES_HOST
              value: {{ include "supabase.db.fullname" . }}

            - name: POSTGRES_DB
              value: {{ .Values.secret.db.database | default "postgres" | quote }}

            # Studio encrypts this password with PG_META_CRYPTO_KEY and passes
            # it to pg-meta on every /query. pg-meta connects as supabase_admin
            # (its PG_META_DB_USER), so the password must match supabase_admin's
            # — not postgres's. In a per-role setup where every Postgres role
            # has its own password, these two roles differ.
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.dbRole" (dict "root" $ "role" "supabase_admin") }}
                  key: password

            - name: PG_META_CRYPTO_KEY
              valueFrom:
                secretKeyRef:
                  {{- if .Values.secret.meta.existingSecret }}
                  name: {{ .Values.secret.meta.existingSecret }}
                  key: {{ .Values.secret.meta.existingSecretKey.cryptoKey | default "cryptoKey" }}
                  {{- else }}
                  name: {{ include "supabase.secret.meta" . }}
                  key: cryptoKey
                  {{- end }}


            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  optional: true
                  {{- if .Values.secret.dashboard.existingSecret }}
                  name: {{ .Values.secret.dashboard.existingSecret }}
                  key: {{ .Values.secret.dashboard.existingSecretKey.openAiApiKey | default "openAiApiKey" }}
                  {{- else }}
                  name: {{ include "supabase.secret.dashboard" . }}
                  key: openAiApiKey
                  {{- end }}

            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  {{- if .Values.secret.jwt.existingSecret }}
                  name: {{ .Values.secret.jwt.existingSecret }}
                  key: {{ .Values.secret.jwt.existingSecretKey.anonKey | default "anonKey" }}
                  {{- else }}
                  name: {{ include "supabase.secret.jwt" . }}
                  key: anonKey
                  {{- end }}

            - name: SUPABASE_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  {{- if .Values.secret.jwt.existingSecret }}
                  name: {{ .Values.secret.jwt.existingSecret }}
                  key: {{ .Values.secret.jwt.existingSecretKey.serviceKey | default "serviceKey" }}
                  {{- else }}
                  name: {{ include "supabase.secret.jwt" . }}
                  key: serviceKey
                  {{- end }}

            - name: AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  {{- if .Values.secret.jwt.existingSecret }}
                  name: {{ .Values.secret.jwt.existingSecret }}
                  key: {{ .Values.secret.jwt.existingSecretKey.secret | default "secret" }}
                  {{- else }}
                  name: {{ include "supabase.secret.jwt" . }}
                  key: secret
                  {{- end }}

            {{- if .Values.deployment.analytics.enabled }}
            - name: LOGFLARE_URL
              value: http://{{ include "supabase.analytics.fullname" . }}:{{ .Values.service.analytics.port }}
            - name:  LOGFLARE_PUBLIC_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  {{- if .Values.secret.analytics.existingSecret }}
                  name: {{ .Values.secret.analytics.existingSecret }}
                  key: {{ .Values.secret.analytics.existingSecretKey.publicAccessToken | default "publicAccessToken" }}
                  {{- else }}
                  name: {{ include "supabase.secret.analytics" . }}
                  key: publicAccessToken
                  {{- end }}
            - name: LOGFLARE_PRIVATE_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  {{- if .Values.secret.analytics.existingSecret }}
                  name: {{ .Values.secret.analytics.existingSecret }}
                  key: {{ .Values.secret.analytics.existingSecretKey.privateAccessToken | default "privateAccessToken" }}
                  {{- else }}
                  name: {{ include "supabase.secret.analytics" . }}
                  key: privateAccessToken
                  {{- end }}
            {{- end }}
            {{- if .Values.deployment.functions.extraConfigMaps }}
            - name: EDGE_FUNCTIONS_MANAGEMENT_FOLDER
              value: /home/deno/functions
            {{- end }}
            {{- if .Values.persistence.snippets.enabled }}
            - name: SNIPPETS_MANAGEMENT_FOLDER
              value: /app/snippets
            {{- end }}
            {{- with .Values.deployment.studio.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.deployment.studio.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.deployment.studio.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          {{- with .Values.deployment.studio.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or .Values.deployment.studio.volumeMounts .Values.deployment.functions.extraConfigMaps .Values.persistence.snippets.enabled }}
          volumeMounts:
            {{- with .Values.deployment.studio.volumeMounts }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- range $cm := .Values.deployment.functions.extraConfigMaps }}
            {{- range $file := default (list "index.ts") $cm.files }}
            - name: fn-{{ $cm.name }}
              mountPath: /home/deno/functions/{{ $cm.mountPath }}/{{ $file }}
              subPath: {{ $file }}
              readOnly: true
            {{- end }}
            {{- end }}
            {{- if .Values.persistence.snippets.enabled }}
            - name: snippets-storage
              mountPath: /app/snippets
            {{- end }}
          {{- end }}
      {{- if or .Values.deployment.studio.volumes .Values.deployment.functions.extraConfigMaps .Values.persistence.snippets.enabled }}
      volumes:
        {{- with .Values.deployment.studio.volumes }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- range .Values.deployment.functions.extraConfigMaps }}
        - name: fn-{{ .name }}
          configMap:
            name: {{ .name }}
        {{- end }}
        {{- if .Values.persistence.snippets.enabled }}
        - name: snippets-storage
          persistentVolumeClaim:
            claimName: {{ include "supabase.pvc.name" (dict "root" $ "name" "snippets") }}
        {{- end }}
      {{- end }}
      {{- with .Values.deployment.studio.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.deployment.studio.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.deployment.studio.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.deployment.studio.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
