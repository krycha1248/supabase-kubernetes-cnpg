{{- $jobName := printf "%s-credentials-generator" (include "supabase.fullname" .) -}}
{{- $saName := include "supabase.generator.serviceAccountName" . -}}
{{- $hasDashboard := and .Values.secret.dashboard (not .Values.secret.dashboard.existingSecret) -}}
{{- $hasAnalytics := and .Values.secret.analytics (not .Values.secret.analytics.existingSecret) -}}
{{- $hasS3 := and .Values.secret.s3 (not .Values.secret.s3.existingSecret) -}}
{{- $hasRealtime := and .Values.secret.realtime (not .Values.secret.realtime.existingSecret) -}}
{{- $hasMeta := and .Values.secret.meta (not .Values.secret.meta.existingSecret) -}}
{{- $hasRustfs := and .Values.secret.rustfs (not .Values.secret.rustfs.existingSecret) -}}
{{- if or $hasDashboard $hasAnalytics $hasS3 $hasRealtime $hasMeta $hasRustfs }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $jobName }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "supabase.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ $saName }}
      volumes:
        - name: creds-work
          emptyDir: {}
      initContainers:
        - name: gen
          image: {{ .Values.secret.jwt.opensslImage | default "alpine/openssl:latest" | quote }}
          command: ["/bin/sh", "-e", "-c"]
          args:
            - |
              # Generate every random credential upfront. Files under /work/
              # are consumed by the apply container; unused files are harmless.
              alnum32() { openssl rand -base64 48 | tr -dc 'a-zA-Z0-9' | head -c 32; }

              {{- if $hasDashboard }}
              alnum32 > /work/dashboard_password
              {{- end }}
              {{- if $hasAnalytics }}
              alnum32 > /work/analytics_publicAccessToken
              alnum32 > /work/analytics_privateAccessToken
              {{- end }}
              {{- if $hasS3 }}
              # Match the S3 convention: 16-byte hex keyId, 32-byte hex accessKey.
              openssl rand -hex 16 > /work/s3_keyId
              openssl rand -hex 32 > /work/s3_accessKey
              {{- end }}
              {{- if $hasRealtime }}
              # Phoenix SECRET_KEY_BASE must be >= 64 chars; base64-encode 64 random bytes.
              openssl rand -base64 64 | tr -d '\n' > /work/realtime_secretKeyBase
              {{- end }}
              {{- if $hasMeta }}
              # postgres-meta cryptoKey: 32 bytes hex = 64 chars.
              openssl rand -hex 32 > /work/meta_cryptoKey
              {{- end }}
              {{- if $hasRustfs }}
              alnum32 > /work/rustfs_password
              {{- end }}
          volumeMounts:
            - name: creds-work
              mountPath: /work
      containers:
        - name: apply
          image: {{ .Values.secret.jwt.generatorImage | default "alpine/k8s:1.34.3" | quote }}
          env:
            {{- if $hasDashboard }}
            - name: DASHBOARD_USERNAME
              value: {{ .Values.secret.dashboard.username | default "supabase" | quote }}
            {{- if .Values.secret.dashboard.openAiApiKey }}
            - name: DASHBOARD_OPENAI_KEY
              value: {{ .Values.secret.dashboard.openAiApiKey | quote }}
            {{- end }}
            {{- end }}
            {{- if $hasRustfs }}
            - name: RUSTFS_USER
              value: {{ .Values.secret.rustfs.user | default "supa-storage" | quote }}
            {{- end }}
          command: ["/bin/sh", "-e", "-c"]
          args:
            - |
              NAMESPACE="$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)"
              create_if_absent() {
                name="$1"
                shift
                if kubectl get secret -n "$NAMESPACE" "$name" >/dev/null 2>&1; then
                  echo "Secret $name exists; leaving untouched."
                  return
                fi
                kubectl create secret generic -n "$NAMESPACE" "$name" "$@"
                echo "Created $name."
              }

              {{- if $hasDashboard }}
              create_if_absent {{ include "supabase.secret.dashboard" . | quote }} \
                --from-literal=username="$DASHBOARD_USERNAME" \
                --from-literal=password="$(cat /work/dashboard_password)"{{- if .Values.secret.dashboard.openAiApiKey }} \
                --from-literal=openAiApiKey="$DASHBOARD_OPENAI_KEY"{{- end }}
              {{- end }}

              {{- if $hasAnalytics }}
              create_if_absent {{ include "supabase.secret.analytics" . | quote }} \
                --from-literal=publicAccessToken="$(cat /work/analytics_publicAccessToken)" \
                --from-literal=privateAccessToken="$(cat /work/analytics_privateAccessToken)"
              {{- end }}

              {{- if $hasS3 }}
              create_if_absent {{ include "supabase.secret.s3" . | quote }} \
                --from-literal=keyId="$(cat /work/s3_keyId)" \
                --from-literal=accessKey="$(cat /work/s3_accessKey)"
              {{- end }}

              {{- if $hasRealtime }}
              create_if_absent {{ include "supabase.secret.realtime" . | quote }} \
                --from-literal=secretKeyBase="$(cat /work/realtime_secretKeyBase)"
              {{- end }}

              {{- if $hasMeta }}
              create_if_absent {{ include "supabase.secret.meta" . | quote }} \
                --from-literal=cryptoKey="$(cat /work/meta_cryptoKey)"
              {{- end }}

              {{- if $hasRustfs }}
              create_if_absent {{ include "supabase.secret.rustfs" . | quote }} \
                --from-literal=user="$RUSTFS_USER" \
                --from-literal=password="$(cat /work/rustfs_password)"
              {{- end }}
          volumeMounts:
            - name: creds-work
              mountPath: /work
{{- end }}
