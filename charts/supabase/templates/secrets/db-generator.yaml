{{- $jobName := printf "%s-db-generator" (include "supabase.fullname" .) -}}
{{- $saName := include "supabase.generator.serviceAccountName" . -}}
{{- $roles := splitList " " (trim (include "supabase.db.roles" .)) -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $jobName }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "supabase.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ $saName }}
      volumes:
        - name: db-work
          emptyDir: {}
      initContainers:
        - name: gen
          image: {{ .Values.secret.jwt.opensslImage | default "alpine/openssl:latest" | quote }}
          command: ["/bin/sh", "-e", "-c"]
          args:
            - |
              # Emit one 32-char alphanumeric password per role into /work/<role>.
              # Alphanumeric-only so the password is URL-safe inside DATABASE_URL
              # (no urlquery step is needed downstream).
              for role in {{ range $roles }}{{ . }} {{ end }}; do
                openssl rand -base64 48 | tr -dc 'a-zA-Z0-9' | head -c 32 > "/work/${role}"
              done
          volumeMounts:
            - name: db-work
              mountPath: /work
      containers:
        - name: apply
          image: {{ .Values.secret.jwt.generatorImage | default "alpine/k8s:1.34.3" | quote }}
          command: ["/bin/sh", "-e", "-c"]
          args:
            - |
              NAMESPACE="$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)"
              create_secret() {
                role="$1"
                secret_name="$2"
                if kubectl get secret -n "$NAMESPACE" "$secret_name" >/dev/null 2>&1; then
                  echo "Secret $secret_name exists for role $role; leaving untouched."
                  return
                fi
                kubectl create secret generic -n "$NAMESPACE" "$secret_name" \
                  --type=kubernetes.io/basic-auth \
                  --from-literal=username="$role" \
                  --from-literal=password="$(cat "/work/${role}")"
                echo "Created $secret_name (role=$role)."
              }
              {{- range $role := $roles }}
              {{- $existing := get (default (dict) $.Values.secret.db.existingSecrets) $role }}
              {{- if $existing }}
              echo "Role {{ $role }} uses existing Secret {{ $existing }} — skipping."
              {{- else }}
              create_secret {{ $role | quote }} {{ include "supabase.secret.dbRole" (dict "root" $ "role" $role) | quote }}
              {{- end }}
              {{- end }}
          volumeMounts:
            - name: db-work
              mountPath: /work
