{{- if .Values.secret.jwt }}
{{- if not .Values.secret.jwt.existingSecret }}
{{- $jobName := printf "%s-jwt-generator" (include "supabase.fullname" .) -}}
{{- $saName := include "supabase.generator.serviceAccountName" . -}}
{{- $secretName := include "supabase.secret.jwt" . -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $jobName }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "supabase.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ $saName }}
      volumes:
        - name: jwt-work
          emptyDir: {}
      initContainers:
        - name: sign
          image: {{ .Values.secret.jwt.signerImage | default "node:24-alpine" | quote }}
          command: ["/bin/sh", "-e", "-c"]
          args:
            - |
              cat >/tmp/sign.js <<'JS'
              // Mirrors supabase/supabase docker/utils/generate-keys.sh +
              // add-new-auth-keys.sh, but all crypto is done with Node stdlib
              // (no npm deps). Writes each output to /work/<name> for the
              // main container to consume.
              const crypto = require('crypto');
              const fs = require('fs');

              const now = Math.floor(Date.now() / 1000);
              const exp = now + 5 * 365 * 24 * 3600;

              const b64url = (b) => Buffer.from(b).toString('base64url');

              // --- HS256 (legacy) -------------------------------------------------
              const jwtSecret = crypto.randomBytes(30).toString('base64');

              function signHS256(payload) {
                const header = { alg: 'HS256', typ: 'JWT' };
                const data = b64url(JSON.stringify(header)) + '.' + b64url(JSON.stringify(payload));
                const sig = crypto.createHmac('sha256', jwtSecret).update(data).digest('base64url');
                return data + '.' + sig;
              }

              const anonKey    = signHS256({ role: 'anon',         iss: 'supabase', iat: now, exp });
              const serviceKey = signHS256({ role: 'service_role', iss: 'supabase', iat: now, exp });

              // --- ES256 (asymmetric) ---------------------------------------------
              const { privateKey } = crypto.generateKeyPairSync('ec', { namedCurve: 'prime256v1' });
              const jwkPrivate = privateKey.export({ format: 'jwk' });
              const kid = crypto.randomUUID();

              const octKey = { kty: 'oct', k: Buffer.from(jwtSecret).toString('base64url'), alg: 'HS256' };

              const jwtKeys = [
                { kty: 'EC', kid, use: 'sig', key_ops: ['sign','verify'], alg: 'ES256', ext: true,
                  crv: jwkPrivate.crv, x: jwkPrivate.x, y: jwkPrivate.y, d: jwkPrivate.d },
                octKey,
              ];
              const jwtJwks = { keys: [
                { kty: 'EC', kid, use: 'sig', key_ops: ['verify'], alg: 'ES256', ext: true,
                  crv: jwkPrivate.crv, x: jwkPrivate.x, y: jwkPrivate.y },
                octKey,
              ]};

              function signES256(payload) {
                const header = { alg: 'ES256', typ: 'JWT', kid };
                const data = b64url(JSON.stringify(header)) + '.' + b64url(JSON.stringify(payload));
                // dsaEncoding: ieee-p1363 produces raw r||s (64 bytes), which is
                // the format JWT requires. Without it, Node emits DER.
                const sig = crypto.sign('SHA256', Buffer.from(data), { key: privateKey, dsaEncoding: 'ieee-p1363' });
                return data + '.' + sig.toString('base64url');
              }

              const anonKeyAsymmetric    = signES256({ role: 'anon',         iss: 'supabase', iat: now, exp });
              const serviceKeyAsymmetric = signES256({ role: 'service_role', iss: 'supabase', iat: now, exp });

              // --- Opaque API keys (sb_publishable_* / sb_secret_*) --------------
              // Matches supabase/supabase add-new-auth-keys.sh format:
              // <prefix><22-char-random>_<8-char-sha256-of(projectRef|intermediate)>
              const projectRef = 'supabase-self-hosted';
              function opaqueKey(prefix) {
                const random = crypto.randomBytes(17).toString('base64url').slice(0, 22);
                const intermediate = prefix + random;
                const checksum = crypto.createHash('sha256')
                  .update(projectRef + '|' + intermediate)
                  .digest('base64url').slice(0, 8);
                return intermediate + '_' + checksum;
              }

              const publishableKey = opaqueKey('sb_publishable_');
              const secretKey      = opaqueKey('sb_secret_');

              // --- Emit ----------------------------------------------------------
              const write = (name, val) => fs.writeFileSync('/work/' + name, val);
              write('secret', jwtSecret);
              write('anonKey', anonKey);
              write('serviceKey', serviceKey);
              write('anonKeyAsymmetric', anonKeyAsymmetric);
              write('serviceKeyAsymmetric', serviceKeyAsymmetric);
              write('publishableKey', publishableKey);
              write('secretKey', secretKey);
              write('jwtKeys', JSON.stringify(jwtKeys));
              write('jwtJwks', JSON.stringify(jwtJwks));
              JS
              node /tmp/sign.js
          volumeMounts:
            - name: jwt-work
              mountPath: /work
      containers:
        - name: apply
          image: {{ .Values.secret.jwt.generatorImage | default "alpine/k8s:1.34.3" | quote }}
          command: ["/bin/sh", "-e", "-c"]
          args:
            - |
              SECRET_NAME={{ $secretName | quote }}
              PUBLISHABLE_SECRET={{ include "supabase.secret.publishableKey" . | quote }}
              CM_NAME="${SECRET_NAME}-sql"
              JWT_EXP={{ .Values.environment.db.JWT_EXP | default "3600" | quote }}
              NAMESPACE="$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)"

              # 1) HS256 + ES256 + JWKS group — single Secret, all-or-nothing.
              # These keys are cryptographically tied (anonKey/serviceKey are
              # HS256-signed with `secret`; jwtKeys/jwtJwks reference the ES256
              # keypair). Splitting per-key would risk inconsistent partial
              # pre-seeds. secretKey is server-side only and stays grouped here.
              if ! kubectl get secret -n "$NAMESPACE" "$SECRET_NAME" >/dev/null 2>&1; then
                kubectl create secret generic -n "$NAMESPACE" "$SECRET_NAME" \
                  --from-literal=secret="$(cat /work/secret)" \
                  --from-literal=anonKey="$(cat /work/anonKey)" \
                  --from-literal=serviceKey="$(cat /work/serviceKey)" \
                  --from-literal=anonKeyAsymmetric="$(cat /work/anonKeyAsymmetric)" \
                  --from-literal=serviceKeyAsymmetric="$(cat /work/serviceKeyAsymmetric)" \
                  --from-literal=secretKey="$(cat /work/secretKey)" \
                  --from-literal=jwtKeys="$(cat /work/jwtKeys)" \
                  --from-literal=jwtJwks="$(cat /work/jwtJwks)"
                echo "Generated $SECRET_NAME with HS256 + ES256 JWTs and JWKS."
              else
                echo "Secret $SECRET_NAME exists; reusing its values."
              fi

              {{- if not (and .Values.secret.publishableKey .Values.secret.publishableKey.existingSecret) }}
              if ! kubectl get secret -n "$NAMESPACE" "$PUBLISHABLE_SECRET" >/dev/null 2>&1; then
                kubectl create secret generic -n "$NAMESPACE" "$PUBLISHABLE_SECRET" \
                  --from-literal=publishableKey="$(cat /work/publishableKey)"
                echo "Generated $PUBLISHABLE_SECRET."
              else
                echo "Secret $PUBLISHABLE_SECRET exists; reusing its value."
              fi
              {{- else }}
              echo "publishableKey supplied via existingSecret ($PUBLISHABLE_SECRET); skipping creation."
              {{- end }}

              jwt_secret=$(kubectl get secret -n "$NAMESPACE" "$SECRET_NAME" -o jsonpath='{.data.secret}' | base64 -d)

              # Materialize 99-jwt.sql as a ConfigMap with literal values so CNPG's
              # bootstrap.initdb doesn't depend on env-var substitution in psql.
              sql="ALTER DATABASE postgres SET \"app.settings.jwt_secret\" TO '${jwt_secret}';
              ALTER DATABASE postgres SET \"app.settings.jwt_exp\" TO '${JWT_EXP}';"

              kubectl create configmap -n "$NAMESPACE" "$CM_NAME" \
                --from-literal=99-jwt.sql="$sql" \
                --dry-run=client -o yaml | kubectl apply -n "$NAMESPACE" -f -

              echo "Wrote ConfigMap $CM_NAME with app.settings.* SQL."
          volumeMounts:
            - name: jwt-work
              mountPath: /work
{{- end }}
{{- end }}
