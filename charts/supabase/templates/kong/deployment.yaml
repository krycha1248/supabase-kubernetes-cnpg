{{- if .Values.deployment.kong.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "supabase.kong.fullname" . }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.kong.enabled }}
  replicas: {{ .Values.deployment.kong.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "supabase.kong.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.deployment.kong.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "supabase.kong.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.image.kong.pullSecrets}}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "supabase.kong.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.deployment.kong.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ include "supabase.kong.name" $ }}
          securityContext:
            {{- toYaml .Values.deployment.kong.securityContext | nindent 12 }}
          image: "{{ .Values.image.kong.repository }}:{{ .Values.image.kong.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.kong.pullPolicy }}
          command: ["/bin/bash"]
          args: ["/home/kong/kong-entrypoint.sh"]
          env:
            {{- range $key, $value := .Values.environment.kong }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  {{- if .Values.secret.jwt.existingSecret }}
                  name: {{ .Values.secret.jwt.existingSecret }}
                  key: {{ .Values.secret.jwt.existingSecretKey.anonKey | default "anonKey" }}
                  {{- else }}
                  name: {{ include "supabase.secret.jwt" . }}
                  key: anonKey
                  {{- end }}
            - name: SUPABASE_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  {{- if .Values.secret.jwt.existingSecret }}
                  name: {{ .Values.secret.jwt.existingSecret }}
                  key: {{ .Values.secret.jwt.existingSecretKey.serviceKey | default "serviceKey" }}
                  {{- else }}
                  name: {{ include "supabase.secret.jwt" . }}
                  key: serviceKey
                  {{- end }}
            # Opaque API keys + asymmetric JWTs, generated by jwt-generator.
            - name: SUPABASE_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.publishableKey" . }}
                  key: publishableKey
            - name: SUPABASE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.jwt" . }}
                  key: secretKey
            - name: ANON_KEY_ASYMMETRIC
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.jwt" . }}
                  key: anonKeyAsymmetric
            - name: SERVICE_ROLE_KEY_ASYMMETRIC
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.jwt" . }}
                  key: serviceKeyAsymmetric
            {{- if .Values.secret.dashboard }}
            - name: DASHBOARD_USERNAME
              valueFrom:
                secretKeyRef:
                  {{- if .Values.secret.dashboard.existingSecret }}
                  name: {{ .Values.secret.dashboard.existingSecret }}
                  key: {{ .Values.secret.dashboard.existingSecretKey.username | default "username" }}
                  {{- else }}
                  name: {{ include "supabase.secret.dashboard" . }}
                  key: username
                  {{- end }}
            - name: DASHBOARD_PASSWORD
              valueFrom:
                secretKeyRef:
                  {{- if .Values.secret.dashboard.existingSecret }}
                  name: {{ .Values.secret.dashboard.existingSecret }}
                  key: {{ .Values.secret.dashboard.existingSecretKey.password | default "password" }}
                  {{- else }}
                  name: {{ include "supabase.secret.dashboard" . }}
                  key: password
                  {{- end }}
            {{- end }}
            {{- with .Values.deployment.kong.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.deployment.kong.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.deployment.kong.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          {{- with .Values.deployment.kong.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - mountPath: /home/kong/temp.yml
              name: config
              subPath: temp.yml
            - mountPath: /home/kong/kong-entrypoint.sh
              name: config
              subPath: kong-entrypoint.sh
            {{- with .Values.deployment.kong.volumeMounts }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
      {{- with .Values.deployment.kong.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.deployment.kong.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.deployment.kong.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.deployment.kong.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "supabase.kong.fullname" $ }}
            defaultMode: 0755
            items:
              - key: temp.yml
                path: temp.yml
              - key: kong-entrypoint.sh
                path: kong-entrypoint.sh
        {{- with .Values.deployment.kong.volumes }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
