{{- if .Values.deployment.auth.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "supabase.fullname" . }}-test-auth
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  ttlSecondsAfterFinished: 100
  template:
    spec:
      containers:
        - name: test-auth
          image: curlimages/curl:8.20.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              curl -sfo /dev/null \
                http://{{ include "supabase.auth.fullname" . }}:{{ .Values.service.auth.port }}/health
              echo "Sevice {{ include "supabase.auth.fullname" . }} is healthy."
      restartPolicy: Never
{{- end }}
